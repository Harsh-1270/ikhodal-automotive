spring.application.name=appointment-booking

# ================= DATABASE =================
spring.datasource.url=jdbc:postgresql://YOUR_DB_HOST:5432/appointment_booking
spring.datasource.username=YOUR_DB_USER
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# ================= JPA / HIBERNATE =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ================= CONNECTION POOL =================
spring.datasource.hikari.maximum-pool-size=10

# ================= SERVER =================
server.port=8082

# ================= JWT =================
jwt.secret=MySuperSecretKeyForJwtGeneration123456
jwt.expiration=3600000
jwt.refresh.expiration=604800000

# ================= LOGGING =================
logging.level.org.springframework.security=INFO
logging.file.name=logs/appointment-booking.log


